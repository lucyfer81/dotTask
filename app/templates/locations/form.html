{% extends "base.html" %}

{% block title %}{{ '编辑地点' if location else '新建地点' }} - APAC Task Manager{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- 页面头部 -->
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900">{{ '编辑地点' if location else '新建地点' }}</h1>
        <a href="{{ url_for('locations.list') }}" class="text-sm text-gray-600 hover:text-gray-900">返回列表</a>
    </div>

    <!-- 表单 -->
    <form method="post" class="bg-white shadow-sm rounded-lg border border-gray-200 p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 地点名称 -->
            <div>
                <label for="location_name" class="block text-sm font-medium text-gray-700 mb-1">
                    地点名称 <span class="text-red-500">*</span>
                </label>
                <input type="text" id="location_name" name="location_name" value="{{ location.location_name if location else '' }}" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- 国家 -->
            <div>
                <label for="country" class="block text-sm font-medium text-gray-700 mb-1">国家</label>
                <input type="text" id="country" name="country" value="{{ location.country if location else '' }}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- 城市 -->
            <div>
                <label for="city" class="block text-sm font-medium text-gray-700 mb-1">城市</label>
                <input type="text" id="city" name="city" value="{{ location.city if location else '' }}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- 地点类型 -->
            <div>
                <label for="location_type" class="block text-sm font-medium text-gray-700 mb-1">地点类型</label>
                <input type="text" id="location_type" name="location_type" value="{{ location.location_type if location else '' }}" placeholder="Plant / Office / Market Office"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- 区域 -->
            <div>
                <label for="region" class="block text-sm font-medium text-gray-700 mb-1">区域</label>
                <input type="text" id="region" name="region" value="{{ location.region if location else '' }}" placeholder="APAC-North / APAC-South"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- IT Manager -->
            <div>
                <label for="it_manager" class="block text-sm font-medium text-gray-700 mb-1">IT Manager</label>
                <input type="text" id="it_manager" name="it_manager" value="{{ location.it_manager if location else '' }}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- Primary IT Contact -->
            <div>
                <label for="primary_it_contact" class="block text-sm font-medium text-gray-700 mb-1">Primary IT Contact</label>
                <input type="text" id="primary_it_contact" name="primary_it_contact" value="{{ location.primary_it_contact if location else '' }}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- 是否激活 -->
            <div class="flex items-center">
                <input type="checkbox" id="is_active" name="is_active" {% if not location or location.is_active %}checked{% endif %}
                    class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                <label for="is_active" class="ml-2 text-sm font-medium text-gray-700">激活状态</label>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="flex items-center justify-end space-x-3 mt-6 pt-6 border-t border-gray-200">
            <a href="{{ url_for('locations.list') }}" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">
                取消
            </a>
            <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700">
                保存
            </button>
        </div>
    </form>
</div>
{% endblock %}
