{% extends "base.html" %}

{% block title %}{{ 'Edit Location' if location else 'New Location' }} - APAC Task Manager{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Page Header -->
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">{{ 'Edit Location' if location else 'New Location' }}</h1>
        <a href="{{ url_for('locations.list') }}" class="text-sm text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-gray-200">Back to List</a>
    </div>

    <!-- Form -->
    <form method="post" class="bg-white dark:bg-cc-card shadow-sm rounded-lg border border-gray-200 dark:border-cc-border p-6"
          x-data="formDraft('draft-location-{{ location.id if location else 'new' }}')">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Location Name -->
            <div>
                <label for="location_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                    Location Name <span class="text-red-500">*</span>
                </label>
                <input type="text" id="location_name" name="location_name" value="{{ location.location_name if location else '' }}" required
                    class="w-full px-3 py-2 border border-gray-300 dark:border-cc-border rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-cc-bg dark:text-gray-200">
            </div>

            <!-- Country -->
            <div>
                <label for="country" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Country</label>
                <select id="country" name="country"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-cc-border rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-cc-bg dark:text-gray-200">
                    <option value="">-- Select Country --</option>
                    {% for c in countries %}
                    <option value="{{ c }}" {% if location and location.country == c %}selected{% endif %}>{{ c }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- City -->
            <div>
                <label for="city" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">City</label>
                <input type="text" id="city" name="city" value="{{ location.city if location else '' }}"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-cc-border rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-cc-bg dark:text-gray-200">
            </div>

            <!-- Location Type -->
            <div>
                <label for="location_type" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Location Type</label>
                <select id="location_type" name="location_type"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-cc-border rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-cc-bg dark:text-gray-200">
                    <option value="">-- Select Type --</option>
                    {% for t in location_types %}
                    <option value="{{ t }}" {% if location and location.location_type == t %}selected{% endif %}>{{ t }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Region -->
            <div>
                <label for="region" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Region</label>
                <input type="text" id="region" name="region" value="{{ location.region if location else '' }}" placeholder="APAC-North / APAC-South"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-cc-border rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-cc-bg dark:text-gray-200">
            </div>

            <!-- IT Contacts (dynamic list) -->
            <div class="md:col-span-2" x-data="contactList({
                roles: [{% for r in it_roles %}'{{ r }}',{% endfor %}],
                contacts: [
                    {% if location and location.it_contacts %}
                    {% for c in location.it_contacts %}
                    { name: '{{ c.name|e }}', role: '{{ c.role|e }}', email: '{{ c.email|e }}', phone: '{{ c.phone|e }}' },
                    {% endfor %}
                    {% endif %}
                ]
            })">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">IT Contacts</label>
                <div class="space-y-3">
                    <template x-for="(c, i) in contacts" :key="i">
                        <div class="flex flex-wrap items-start gap-2 p-3 bg-gray-50 dark:bg-gray-800 rounded-md border border-gray-200 dark:border-cc-border">
                            <div class="flex-1 min-w-[140px]">
                                <input type="text" x-model="c.name" name="contact_name" class="w-full px-2 py-1 border border-gray-300 dark:border-cc-border rounded text-sm dark:bg-cc-bg dark:text-gray-200" placeholder="Name">
                            </div>
                            <div class="w-[160px]">
                                <select x-model="c.role" name="contact_role" class="w-full px-2 py-1 border border-gray-300 dark:border-cc-border rounded text-sm dark:bg-cc-bg dark:text-gray-200">
                                    <option value="">-- Role --</option>
                                    <template x-for="r in roles"><option :value="r" x-text="r"></option></template>
                                </select>
                            </div>
                            <div class="flex-1 min-w-[160px]">
                                <input type="email" x-model="c.email" name="contact_email" class="w-full px-2 py-1 border border-gray-300 dark:border-cc-border rounded text-sm dark:bg-cc-bg dark:text-gray-200" placeholder="Email">
                            </div>
                            <div class="w-[130px]">
                                <input type="tel" x-model="c.phone" name="contact_phone" class="w-full px-2 py-1 border border-gray-300 dark:border-cc-border rounded text-sm dark:bg-cc-bg dark:text-gray-200" placeholder="Phone">
                            </div>
                            <button type="button" @click="contacts.splice(i, 1)" class="px-2 py-1 text-red-600 dark:text-red-400 hover:text-red-800 text-sm" title="Remove">&times;</button>
                        </div>
                    </template>
                </div>
                <button type="button" @click="contacts.push({ name: '', role: '', email: '', phone: '' })"
                    class="mt-2 px-3 py-1 text-sm font-medium text-blue-600 dark:text-blue-400 hover:text-blue-800 border border-blue-300 dark:border-blue-700 rounded">
                    + Add Contact
                </button>
            </div>

            <!-- Active Status -->
            <div class="flex items-center">
                <input type="checkbox" id="is_active" name="is_active" {% if not location or location.is_active %}checked{% endif %}
                    class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                <label for="is_active" class="ml-2 text-sm font-medium text-gray-700 dark:text-gray-300">Active</label>
            </div>

            <!-- Comments -->
            <div class="md:col-span-2">
                <label for="comments" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Comments</label>
                <textarea id="comments" name="comments" rows="3"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-cc-border rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-cc-bg dark:text-gray-200">{{ location.comments if location and location.comments else '' }}</textarea>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex items-center justify-end space-x-3 mt-6 pt-6 border-t border-gray-200 dark:border-cc-border">
            <a href="{{ url_for('locations.list') }}" class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-cc-card border border-gray-300 dark:border-cc-border rounded-md hover:bg-gray-50 dark:hover:bg-gray-700">
                Cancel
            </a>
            <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700">
                Save
            </button>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
function contactList(config) {
    return {
        roles: config.roles,
        contacts: config.contacts.length ? config.contacts : [{ name: '', role: '', email: '', phone: '' }]
    };
}
</script>
{% endblock %}
